[package]
name         = "ec-kernel"
version      = "0.1.0"
edition      = "2024"
description  = "Shared utilities for EpicCounty Knowledge Creation Platform products"
license      = "Apache-2.0"
repository   = "https://github.com/epicsagas/ec-kernel"
homepage     = "https://github.com/epicsagas/ec-kernel"
rust-version = "1.92"

[lib]
name = "ec_kernel"
path = "src/lib.rs"

[dependencies]
# Serialization
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"

# Config
toml = "1"

# Database
rusqlite = { version = "0.40", features = ["bundled"] }

# Error handling
thiserror = "2"
anyhow    = "1"

# Async
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

# HTTP client (LLM API calls)
reqwest = { version = "0.13", features = ["json", "rustls"], default-features = false }

# Logging
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time
chrono = { version = "0.4", features = ["clock"] }

# UUID
uuid = { version = "1", features = ["v4"] }

# Async trait
async-trait = "0.1"

[dev-dependencies]
tempfile = "3"

[profile.dev]
opt-level = 0
debug = 1

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"

[profile.release.package."*"]
opt-level = 3
codegen-units = 4

[profile.dist]
inherits = "release"
lto = "thin"
