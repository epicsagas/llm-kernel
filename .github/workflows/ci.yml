name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CI: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "--all-features"
          - "--no-default-features"
          - "--no-default-features --features provider"
          - "--no-default-features --features discovery"
          - "--no-default-features --features secrets"
          - "--no-default-features --features store"
          - "--no-default-features --features config"
          - "--no-default-features --features client-async"
          - "--no-default-features --features graph"
          - "--no-default-features --features full"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (${{ matrix.features }})
        run: cargo test ${{ matrix.features }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx -f json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: "*.cdx.json"

  directml-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW cross-compiler
        run: sudo apt-get install -y mingw-w64
      - uses: Swatinem/rust-cache@v2
      - name: Check DirectML feature (Windows cross-compile)
        run: cargo check --features embedding-fastembed-directml --target x86_64-pc-windows-gnu

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
