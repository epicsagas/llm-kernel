name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CI: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (OpenBLAS for turbovec)
        run: sudo apt-get install -y libopenblas-dev
      - name: Clippy (full)
        run: cargo clippy --features full -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "--features full"
          - "--no-default-features"
          - "--no-default-features --features provider"
          - "--no-default-features --features discovery"
          - "--no-default-features --features catalog-sync"
          - "--no-default-features --features secrets"
          - "--no-default-features --features store"
          - "--no-default-features --features config"
          - "--no-default-features --features client-async"
          - "--no-default-features --features cache"
          - "--no-default-features --features discovery-async"
          - "--no-default-features --features graph"
          - "--no-default-features --features graph-async"
          - "--no-default-features --features graph-pool"
          - "--no-default-features --features graph-cjk"
          - "--no-default-features --features graph-pg"
          - "--no-default-features --features graph-pg-sqlx"
          - "--no-default-features --features mcp"
          - "--no-default-features --features mcp-http"
          - "--no-default-features --features tokens"
          - "--no-default-features --features safety"
          - "--no-default-features --features telemetry"
          - "--no-default-features --features search"
          - "--no-default-features --features federation"
          - "--no-default-features --features embedding"
          - "--no-default-features --features embedding-openai"
          - "--no-default-features --features vector-index"
          - "--no-default-features --features install"
          - "--no-default-features --features qdrant"
          - "--no-default-features --features elastic"
          - "--no-default-features --features pgvector"
          - "--no-default-features --features full"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (OpenBLAS for turbovec)
        run: sudo apt-get install -y libopenblas-dev
      - name: Test (${{ matrix.features }})
        run: cargo test ${{ matrix.features }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (OpenBLAS for turbovec)
        run: sudo apt-get install -y libopenblas-dev
      - name: Build docs
        run: cargo doc --features full --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx -f json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: "*.cdx.json"

  directml-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check DirectML feature (Windows native)
        run: cargo check --features embedding-fastembed-directml
      - name: Clippy DirectML feature (Windows native)
        run: cargo clippy --features embedding-fastembed-directml -- -D warnings

  # Release-link regression guard for the statically-linked ONNX Runtime path
  # (#55). ort-sys downloads + links a prebuilt static archive at build time, so
  # any static-link regression surfaces here at the link step — not at consumer
  # release time. macOS static linking is covered by `macos-check` below (which
  # injects the clang_rt link path the Xcode 16+ image drops); this matrix
  # covers the Linux/Windows release link. The static archive requires glibc
  # 2.38+ / a current MSVC CRT, so ubuntu-22.04 (glibc 2.35) instead verifies
  # the `embedding-fastembed-dynamic-linking` escape hatch — plus a clippy pass,
  # since the dynamic path is excluded from `full` — on exactly the baseline
  # alcove rolled back from.
  release-link-check:
    name: Release link (${{ matrix.os }} / ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            features: embedding-fastembed
          - os: windows-latest
            features: embedding-fastembed
          - os: ubuntu-22.04
            features: embedding-fastembed-dynamic-linking
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Release build
        run: cargo build --release --no-default-features --features ${{ matrix.features }}
      - name: Clippy (escape-hatch path)
        if: matrix.features == 'embedding-fastembed-dynamic-linking'
        run: cargo clippy --release --no-default-features --features ${{ matrix.features }} -- -D warnings

  macos-check:
    # macos-latest (Xcode 26.5 / clang 21) dropped libclang_rt.osx.a, which
    # ort's static archive links against (#57). Pin macos-14 (Xcode 15.x)
    # until the 26.5 image stabilizes; see #57.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # ort's static archive links against libclang_rt.osx.a, which the Xcode
      # 16+ macOS runner image no longer puts on the default linker search path
      # (#55: "separately broken by a compiler-rt path regression"). Add the
      # rustc self-contained darwin lib dir so `ld` can resolve it. Note: this
      # regression was previously masked because --all-features enabled the
      # broken dynamic-linking feature, which skipped the static link entirely.
      - name: Configure macOS clang_rt link path
        run: |
          set -e
          HOST=$(rustc -vV | sed -n 's/^host: //p')
          CLANG_RT_DIR="$(rustc --print sysroot)/lib/rustlib/$HOST/lib"
          if [ ! -f "$CLANG_RT_DIR/libclang_rt.osx.a" ]; then
            CLANG_RT_DIR=$(dirname "$(find "$(rustc --print sysroot)" -name 'libclang_rt.osx.a' -print -quit)")
          fi
          echo "Resolved clang_rt dir: $CLANG_RT_DIR"
          echo "RUSTFLAGS=-L$CLANG_RT_DIR" >> "$GITHUB_ENV"
      - name: Check (macOS)
        run: cargo check --features full
      - name: Test (macOS)
        # Xcode 26.5 / clang 21 no longer ships libclang_rt.osx.a, which ort's
        # static archive links against — a macOS runner-image environment issue,
        # not a regression in this crate. The static ort link itself is guarded
        # by `release-link-check` on the supported Linux/Windows targets. Tracked
        # in #57; do not block the PR on this step.
        continue-on-error: true
        run: cargo test --features full

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run quality eval (regression + strict gate)
        # --strict exits non-zero if any module fails, errors, or disappears vs
        # baseline — previously a dataset load failure or failing module exited
        # 0 and masked regressions (ROADMAP v1.0.0 #3, issue #45 axis A).
        run: cargo run --bin llm-kernel-eval --features eval-full -- --strict --baseline eval/baseline.json all

  # Compile + single-pass execution of every benchmark. criterion's `--test` mode
  # runs each bench once with no timing verdict, so this is deterministic and
  # safe as a blocking gate: it catches benchmark breakage (compile error, panic,
  # fixture regression) without the flakiness of timing comparison on a shared
  # runner. Timing regression detection stays a local-only workflow — shared
  # runners' CPU steal/turbo variance routinely exceeds criterion's 1% noise
  # threshold (see docs/benchmarks/README.md). (ROADMAP v1.0.0 #3, issue #45.)
  bench-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Bench smoke (compile + single-pass run)
        run: cargo bench --no-default-features --features "graph,search,tokens,embedding" -- --test
