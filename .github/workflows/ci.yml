name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CI: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (OpenBLAS for turbovec)
        run: sudo apt-get install -y libopenblas-dev
      - name: Clippy (all features)
        run: cargo clippy --all-features -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "--all-features"
          - "--no-default-features"
          - "--no-default-features --features provider"
          - "--no-default-features --features discovery"
          - "--no-default-features --features catalog-sync"
          - "--no-default-features --features secrets"
          - "--no-default-features --features store"
          - "--no-default-features --features config"
          - "--no-default-features --features client-async"
          - "--no-default-features --features graph"
          - "--no-default-features --features graph-pg"
          - "--no-default-features --features qdrant"
          - "--no-default-features --features elastic"
          - "--no-default-features --features full"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (OpenBLAS for turbovec)
        run: sudo apt-get install -y libopenblas-dev
      - name: Test (${{ matrix.features }})
        run: cargo test ${{ matrix.features }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (OpenBLAS for turbovec)
        run: sudo apt-get install -y libopenblas-dev
      - name: Build docs
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx -f json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: "*.cdx.json"

  directml-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check DirectML feature (Windows native)
        run: cargo check --features embedding-fastembed-directml
      - name: Clippy DirectML feature (Windows native)
        run: cargo clippy --features embedding-fastembed-directml -- -D warnings

  macos-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check (macOS)
        run: cargo check --all-features
      - name: Test (macOS)
        run: cargo test --all-features

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (OpenBLAS for turbovec)
        run: sudo apt-get install -y libopenblas-dev
      - name: Run quality eval (regression check)
        run: cargo run --bin llm-kernel-eval --features eval-full -- --baseline eval/baseline.json all
